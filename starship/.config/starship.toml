"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os $directory$git_branch$git_status$fill$docker_context$package$nodejs$direnv$battery
$character"""

right_format = """$status$cmd_duration"""

add_newline = true

[os]
disabled = false
style = "bold blue"

[os.symbols]
Macos = "\U000F0035"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bold purple"

[git_status]
style = "bold red"
stashed = '\$${count}'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[fill]
symbol = " "

[status]
disabled = false
style = "bold red"

[nodejs]
style = "bold green"

[package]
style = "bold 208"
# RN/Expo package.json is almost always "private": true; the version is
# still useful to see, it's not sensitive.
display_private = true

[docker_context]
style = "bold blue"

[direnv]
disabled = false

[battery]
disabled = false

[cmd_duration]
min_time = 500
style = "bold yellow"
